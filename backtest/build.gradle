/*
 * This file configures the 'backtest' module for the quant project.
 * The module targets Java 17 and uses JUnit Jupiter for testing.
 */

plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter'
    
    // Add your backtest module dependencies below as needed
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}